version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
      time: "04:15"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - mr-suw
    versioning-strategy: increase

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      time: "04:45"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - mr-suw
